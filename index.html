<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FFF5F7;
    --card: #FFFDFC;
    --ink: #7A2E42;
    --ink-soft: #A15C71;
    --pink: #E88CA8;
    --pink-light: #F4B8C8;
    --pink-pale: #FBE1E8;
    --shadow: rgba(122, 46, 66, 0.12);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior: smooth; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  ::selection{ background: var(--pink-light); color: var(--ink); }

  h1, h2, .serif{ font-family: 'Playfair Display', serif; }

  section{
    padding: 100px 24px;
    max-width: 1080px;
    margin: 0 auto;
  }

  /* ---------- hero ---------- */
  .hero{
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .hero .eyebrow{
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: var(--ink-soft);
    margin-bottom: 24px;
  }

  .hero h1{
    font-size: clamp(2.6rem, 7vw, 5rem);
    font-weight: 500;
    font-style: italic;
    line-height: 1.15;
    max-width: 16ch;
  }

  .hero p{
    margin-top: 28px;
    font-size: 1.05rem;
    color: var(--ink-soft);
    max-width: 40ch;
    line-height: 1.7;
  }

  .pill-btn{
    margin-top: 40px;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--pink);
    cursor: pointer;
    padding: 14px 30px;
    border: 1.5px solid var(--pink-light);
    border-radius: 40px;
    background: var(--card);
    font-family: 'Poppins', sans-serif;
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .pill-btn:hover{ transform: translateY(-2px); background: var(--pink-pale); }

  /* ---------- section headers ---------- */
  .section-head{
    text-align: center;
    margin-bottom: 56px;
  }

  .section-head .eyebrow{
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: var(--pink);
    margin-bottom: 14px;
    display: block;
  }

  .section-head h2{
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 500;
    font-style: italic;
  }

  /* ---------- photo grid ---------- */
  .gallery{
    columns: 4 220px;
    column-gap: 20px;
  }

  .polaroid{
    break-inside: avoid;
    margin-bottom: 20px;
    background: var(--card);
    padding: 10px;
    border-radius: 6px;
    box-shadow: 0 10px 24px var(--shadow);
    transform: rotate(var(--r, 0deg));
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  .polaroid:nth-child(5n+1){ --r: -2.5deg; }
  .polaroid:nth-child(5n+2){ --r: 1.5deg; }
  .polaroid:nth-child(5n+3){ --r: -1deg; }
  .polaroid:nth-child(5n+4){ --r: 2.5deg; }
  .polaroid:nth-child(5n+5){ --r: -1.8deg; }

  .polaroid:hover{
    transform: rotate(0deg) scale(1.03);
    box-shadow: 0 16px 34px var(--shadow);
    z-index: 5;
  }

  .polaroid img{
    width: 100%;
    display: block;
    border-radius: 3px;
    background: var(--pink-pale);
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  /* ---------- lightbox ---------- */
  .lightbox{
    position: fixed;
    inset: 0;
    background: rgba(122, 46, 66, 0.55);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 40px;
  }

  .lightbox.open{ display: flex; }

  .lightbox img{
    max-width: min(90vw, 700px);
    max-height: 80vh;
    border-radius: 8px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
  }

  .lightbox-close{
    position: absolute;
    top: 30px;
    right: 40px;
    color: white;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Poppins', sans-serif;
  }

  /* ---------- video strip ---------- */
  .video-strip{
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 16px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
  }

  .video-strip::-webkit-scrollbar{ height: 6px; }
  .video-strip::-webkit-scrollbar-thumb{ background: var(--pink-light); border-radius: 10px; }
  .video-strip::-webkit-scrollbar-track{ background: transparent; }

  .video-card{
    flex: 0 0 auto;
    scroll-snap-align: center;
    width: min(300px, 76vw);
    position: relative;
  }

  .video-card video{
    width: 100%;
    aspect-ratio: 9/16;
    object-fit: cover;
    border-radius: 16px;
    background: var(--pink-pale);
    box-shadow: 0 14px 30px var(--shadow);
    display: block;
  }

  .sound-tag{
    position: absolute;
    bottom: 14px;
    right: 14px;
    background: rgba(122, 46, 66, 0.6);
    color: white;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    font-family: 'Poppins', sans-serif;
  }

  .sound-tag.hide{ display: none; }

  .next-wrap{
    text-align: center;
    margin-top: 56px;
  }

  /* ---------- persistent mini player ---------- */
  .mini-player{
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border-radius: 40px;
    padding: 8px 16px 8px 8px;
    box-shadow: 0 12px 30px var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .mini-player.show{ opacity: 1; pointer-events: auto; }

  .mini-vinyl{
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background:
      radial-gradient(circle at center, var(--card) 0 4px, transparent 5px),
      repeating-radial-gradient(circle at center, var(--ink) 0 1px, var(--pink) 2px 5px);
    animation: spin 5s linear infinite;
    animation-play-state: paused;
    flex-shrink: 0;
  }

  .mini-vinyl.playing{ animation-play-state: running; }

  @keyframes spin{ to{ transform: rotate(360deg); } }

  .mini-toggle{
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    font-family: 'Poppins', sans-serif;
  }

  /* ---------- letter + closing (revealed after videos) ---------- */
  .after-videos{
    display: none;
  }

  .after-videos.show{
    display: block;
    animation: fade-up 0.6s ease;
  }

  @keyframes fade-up{
    from{ opacity: 0; transform: translateY(20px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .letter{ max-width: 640px; }

  .letter p{
    font-size: 1.02rem;
    line-height: 1.9;
    color: var(--ink);
  }

  .closing{
    text-align: center;
    padding-bottom: 140px;
  }

  .closing h2{
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    font-weight: 500;
    font-style: italic;
    max-width: 20ch;
    margin: 0 auto 40px;
    line-height: 1.35;
  }

  .choices{
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn{
    font-family: 'Poppins', sans-serif;
    font-size: 0.9rem;
    padding: 16px 34px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .btn-primary{
    background: var(--pink);
    color: white;
    box-shadow: 0 12px 28px rgba(232, 140, 168, 0.45);
  }

  .btn-primary:hover{ transform: translateY(-3px); }

  .btn-secondary{
    background: transparent;
    color: var(--ink-soft);
    border: 1.5px solid var(--pink-light);
  }

  .btn-secondary:hover{ transform: translateY(-3px); background: var(--pink-pale); }

  .response-note{
    margin-top: 32px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.2rem;
    min-height: 1.5em;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .response-note.show{ opacity: 1; }

  .choices.hide{ display: none; }

  footer{
    text-align: center;
    padding: 40px 24px 90px;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.55;
  }

  @media (max-width: 640px){
    section{ padding: 80px 20px; }
    .gallery{ columns: 2 150px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <span class="eyebrow">one more day, just us</span>
  <h1>every little thing<br>we did together</h1>
  <p>I put it all in one place — the photos, the videos. Scroll down.</p>
  <button class="pill-btn" id="startBtn">tap to begin ♥</button>
</section>

<!-- PHOTOS -->
<section id="photos">
  <div class="section-head">
    <span class="eyebrow">the album</span>
    <h2>the memories we'll always keep</h2>
  </div>
  <div class="gallery" id="gallery"></div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">close ✕</button>
  <img id="lightboxImg" src="" alt="memory">
</div>

<!-- VIDEOS -->
<section id="videos">
  <div class="section-head">
    <span class="eyebrow">the clips</span>
    <h2>us</h2>
  </div>
  <div class="video-strip" id="videoStrip"></div>
  <div class="next-wrap">
    <button class="pill-btn" id="nextBtn">next ♥</button>
  </div>
</section>

<!-- LETTER + CLOSING, revealed after tapping next -->
<div id="afterVideos" class="after-videos">

  <section>
    <div class="letter">
      <p id="letterText"></p>
    </div>
  </section>

  <section class="closing">
    <h2>so, one more date?</h2>
    <div class="choices" id="choices">
      <button class="btn btn-primary" id="yesBtn">yes</button>
      <button class="btn btn-secondary" id="noBtn">no</button>
    </div>
    <div class="response-note" id="responseNote"></div>
  </section>

</div>

<footer>made with a lot of memory and a little html</footer>

<!-- persistent mini player, appears once song starts -->
<div class="mini-player" id="miniPlayer">
  <div class="mini-vinyl" id="miniVinyl"></div>
  <button class="mini-toggle" id="miniToggle">playing</button>
</div>
<audio id="audio" loop preload="auto" src="song.mp3"></audio>

<script>
  /* ============ CONFIG ============ */
  const PHOTO_COUNT = 16;   // :photos/0.JPG through :photos/15.JPG
  const VIDEO_COUNT = 9;    // :videos/0.MP4 through :videos/8.MP4
  const photoPath = (i) => `:photos/${i}.JPG`;
  const videoPath = (i) => `:videos/${i}.MP4`;
  const songPath = 'song.mp3';

  /* ============ LETTER ============ */
  const letterText = "I don't really know how to say this without it sounding melancholic, so I'll just say it plainly. This last year and a half has meant more to me than I probably showed. Every photo, every video, every song weve heard none of it was special because of what we were doing, it was always special because of who I was doing it with. You made ordinary days feel worth remembering, and that's not a small thing. I'm grateful for the version of me that got to know you and the version u got out of me, and for all the good, easy, unplanned moments in between. WNo matter what happens after today, I hope you know that none of this was ever fake to me. It was real. You were real and I’m so thankful I got to experience this chapter of my life with you.. Thank you, truly, for all of it. On that note.....";
  document.getElementById('letterText').textContent = letterText;

  /* ============ PHOTO GALLERY ============ */
  const gallery = document.getElementById('gallery');
  for(let i = 0; i < PHOTO_COUNT; i++){
    const fig = document.createElement('div');
    fig.className = 'polaroid';
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.decoding = 'async';
    img.src = photoPath(i);
    img.alt = '';
    fig.appendChild(img);
    fig.addEventListener('click', () => openLightbox(img.src));
    gallery.appendChild(fig);
  }

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  function openLightbox(src){
    lightboxImg.src = src;
    lightbox.classList.add('open');
  }
  document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', (e) => { if(e.target === lightbox) lightbox.classList.remove('open'); });

  /* ============ VIDEO STRIP ============ */
  const videoStrip = document.getElementById('videoStrip');
  const videoEls = [];
  for(let i = 0; i < VIDEO_COUNT; i++){
    const card = document.createElement('div');
    card.className = 'video-card';

    const video = document.createElement('video');
    video.playsInline = true;
    video.muted = true;
    video.loop = true;
    video.preload = 'none';
    video.dataset.src = videoPath(i);

    const soundTag = document.createElement('button');
    soundTag.className = 'sound-tag';
    soundTag.textContent = 'tap for sound';
    soundTag.addEventListener('click', () => {
      videoEls.forEach(v => v.muted = true);
      document.querySelectorAll('.sound-tag').forEach(t => t.classList.remove('hide'));
      video.muted = false;
      soundTag.classList.add('hide');
    });

    card.appendChild(video);
    card.appendChild(soundTag);
    videoStrip.appendChild(card);
    videoEls.push(video);
  }

  // autoplay (muted) each video once mostly in view, pause when scrolled away
  const videoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const v = entry.target;
      if(entry.isIntersecting){
        if(!v.src) v.src = v.dataset.src;
        v.play().catch(() => {});
      } else {
        v.pause();
      }
    });
  }, { threshold: 0.6 });
  videoEls.forEach(v => videoObserver.observe(v));

  /* ============ SONG ============ */
  const audio = document.getElementById('audio');
  const miniPlayer = document.getElementById('miniPlayer');
  const miniVinyl = document.getElementById('miniVinyl');
  const miniToggle = document.getElementById('miniToggle');
  const startBtn = document.getElementById('startBtn');

  function startSong(){
    const p = audio.play();
    if(p !== undefined){
      p.then(() => {
        miniVinyl.classList.add('playing');
        miniToggle.textContent = 'playing';
        miniPlayer.classList.add('show');
        startBtn.textContent = 'playing ♥';
      }).catch((err) => {
        console.warn('song failed to start:', err);
        startBtn.textContent = 'tap again ♥';
      });
    }
  }

  audio.addEventListener('error', () => {
    console.warn('audio failed to load — confirm song.mp3 sits next to index.html');
  });

  startBtn.addEventListener('click', startSong);

  miniToggle.addEventListener('click', () => {
    if(audio.paused){
      audio.play();
      miniVinyl.classList.add('playing');
      miniToggle.textContent = 'playing';
    } else {
      audio.pause();
      miniVinyl.classList.remove('playing');
      miniToggle.textContent = 'paused';
    }
  });

  /* ============ NEXT BUTTON ============ */
  const afterVideos = document.getElementById('afterVideos');
  document.getElementById('nextBtn').addEventListener('click', () => {
    afterVideos.classList.add('show');
    afterVideos.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  /* ============ YES / NO ============ */
  const note = document.getElementById('responseNote');
  const choices = document.getElementById('choices');
  document.getElementById('yesBtn').addEventListener('click', () => {
    note.textContent = "yay okay, see you soon";
    note.classList.add('show');
    choices.classList.add('hide');
  });
  document.getElementById('noBtn').addEventListener('click', () => {
    note.textContent = "that's okay too — thank you, for everything";
    note.classList.add('show');
    choices.classList.add('hide');
  });
</script>

</body>
</html>
